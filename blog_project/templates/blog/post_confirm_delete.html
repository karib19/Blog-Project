{% extends 'base.html' %}

{% block content %}
<div class="card p-4">
    <h3>Delete Post</h3>
    <p>
        Are you sure you want to delete
        <strong>{{ post.title }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
